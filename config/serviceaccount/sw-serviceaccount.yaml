deploy: false
project_id: "sw-dev-test-prj-sandbox"
region: "us"
environment: "prod"                        # prod | staging | dev

# ------- Labels ----------------------------------------------
labels:
  environment: prod
  team: platform
  app: my-app
  managed_by: terraform

# ------- Annotations -----------------------------------------
annotations:
  description: "Service account key managed by Terraform"
  owner: "platform-team"

# ------- Secret Manager --------------------------------------
secret_manager_project_id: "sw-dev-test-prj-itp-secrets"             # Leave blank to use project_id
replication_type: auto
replication_locations: []                 # Used only if replication_type: user-managed
kms_key_name: null                        # Optional CMEK key name

# ------- Key Rotation ----------------------------------------
key_rotation_days: 90
rotation_period: "7776000s"               # 90 days in seconds
next_rotation_time: "2025-09-01T00:00:00Z"
ttl: null                                 # Optional secret TTL

# ------- Service Accounts ------------------------------------
service_accounts:

  # -- App Backend SA ------------------------------------------
  app-backend:
    account_id: "app-backend-sa"
    display_name: "App Backend Service Account"
    description: "Used by the backend application to access GCP services"
    create_key: true
    secret_id: "service-account"       # Must already exist in Secret Manager
    iam_roles:
      - "roles/storage.objectViewer"
      - "roles/cloudsql.client"
      - "roles/secretmanager.secretAccessor"
    versions:
      v2:
        secret_data: null                 # Auto-populated from generated SA key
        enabled: true
    iam_bindings:
      - member: "serviceAccount:app-backend-sa@sw-dev-test-prj-sandbox.iam.gserviceaccount.com"
        role: "roles/secretmanager.secretVersionManager"
