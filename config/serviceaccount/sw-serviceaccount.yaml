deploy: true
project_id: "sw-dev-prj-sandbox"
region: "us"
environment: "prod"
labels:
  environment: prod
  team: platform
  app: my-app
  managed_by: terraform
annotations:
  description: "Service account key managed by Terraform"
  owner: "platform-team"
secret_manager_project_id: "sw-dev-prj-itp-secrets"
replication_type: auto
replication_locations: []
kms_key_name: null
key_rotation_days: 90
rotation_period: "7776000s"
next_rotation_time: "2025-09-01T00:00:00Z"
ttl: null
service_accounts:
  app-backend:
    account_id: "app-backend-sa"
    display_name: "App Backend Service Account"
    description: "Used by the backend application to access GCP services"
    create_key: true
    secret_id: "dev-rds-secrets"
    iam_roles:
      - "roles/storage.objectViewer"
      - "roles/secretmanager.secretAccessor"
    versions:
      v2:
        secret_data: null
        enabled: true
    iam_bindings:
      - member: "serviceAccount:app-backend-sa@sw-dev-prj-sandbox.iam.gserviceaccount.com"
        role: "roles/secretmanager.secretVersionManager"
