deploy: true
project_id: my-host-project-id
region: us-central1
secret_manager_project_id: my-secrets-project-id

service_accounts:

  - account_id: sa-ci-deployer
    display_name: CI Deployer SA
    description: Used by CI pipeline to deploy Cloud Run and GCS resources
    deploy: true
    roles:
      - roles/run.admin
      - roles/storage.objectAdmin
      - roles/iam.serviceAccountUser
    secret_id: ci-deployer-sa-key

  - account_id: sa-data-exporter
    display_name: Data Exporter SA
    description: Reads from BigQuery and writes to GCS
    deploy: true
    roles:
      - roles/bigquery.dataViewer
      - roles/storage.objectCreator
    secret_id: data-exporter-sa-key

  - account_id: sa-terraform-runner
    display_name: Terraform Runner SA
    description: Runs Terraform plans and applies in automation
    deploy: true
    roles:
      - roles/editor
      - roles/iam.securityAdmin
    secret_id: terraform-runner-sa-key